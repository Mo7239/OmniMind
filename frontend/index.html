<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">🧠 OmniMind</h1>
                <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>
            </div>

            <div class="upload-section">
                <p class="section-title">Upload Document</p>
                <label class="upload-label" for="file-input">
                    📄 Choose File
                    <input type="file" id="file-input" accept=".txt,.pdf,.docx" hidden>
                </label>
                <p id="upload-status" class="upload-status"></p>
            </div>

            <div class="sidebar-footer">
                <p class="version">v1.0.0</p>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-container">
            <div class="chat-header">
                <span id="agent-badge" class="agent-badge">🤖 Researcher</span>
            </div>

            <div class="messages" id="messages">
                <div class="welcome-message">
                    <h2>Welcome to OmniMind 🧠</h2>
                    <p>Ask me anything or upload a document to get started.</p>
                </div>
            </div>

            <div class="input-area">
                <textarea
                    id="user-input"
                    placeholder="Ask me anything..."
                    rows="1"
                ></textarea>
                <button id="send-btn" class="send-btn">➤</button>
            </div>
        </main>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
